<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>eメタンファクトリー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
#c{position:fixed;touch-action:none;display:block}
</style>
</head>
<body><canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),W=390,H=844;
C.width=W;C.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H),cw=W*s,ch=H*s;C.style.width=cw+'px';C.style.height=ch+'px';C.style.left=((innerWidth-cw)/2)+'px';C.style.top=((innerHeight-ch)/2)+'px';}
resize();addEventListener('resize',resize);
function gp(e){const t=e.changedTouches?e.changedTouches[0]:e,r=C.getBoundingClientRect();return{x:(t.clientX-r.left)*W/r.width,y:(t.clientY-r.top)*H/r.height};}
['touchstart','touchmove','touchend','touchcancel'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));

// ── Layout ─────────────────────────────────────────────────
const TOP=70,BOT=96;          // top-bar / dialogue-box height
const PT=TOP,PB=H-BOT;        // default play area
const S2PB=H-210;             // S2 play area bottom (above joystick)
const JCX=W/2,JCY=H-110,JR=74;// joystick

// ── State ──────────────────────────────────────────────────
const ST={T:0,S1:1,S2:2,S3:3,S4:4,E:5};
let state=ST.T,frame=0,fd={a:0,dir:0,nxt:-1};
function fade(n){if(!fd.dir){fd.dir=1;fd.nxt=n;}}
function updFade(){
  if(!fd.dir)return;
  fd.a=Math.min(1,Math.max(0,fd.a+fd.dir*.055));
  if(fd.dir===1&&fd.a>=1){fd.dir=-1;state=fd.nxt;[iT,i1,i2,i3,i4,iE][fd.nxt]?.();}
  if(fd.dir===-1&&fd.a<=0){fd.a=0;fd.dir=0;fd.nxt=-1;}
}

// ── Joystick ───────────────────────────────────────────────
let joy={on:false,kx:JCX,ky:JCY,dx:0,dy:0};
function jS(x,y){const dx=x-JCX,dy=y-JCY;if(dx*dx+dy*dy<(JR+30)**2){joy.on=true;jM(x,y);return true;}return false;}
function jM(x,y){if(!joy.on)return;const dx=x-JCX,dy=y-JCY,d=Math.hypot(dx,dy)||1,cr=Math.min(d,JR);joy.kx=JCX+dx/d*cr;joy.ky=JCY+dy/d*cr;joy.dx=dx/d*Math.min(1,d/JR);joy.dy=dy/d*Math.min(1,d/JR);}
function jE(){joy.on=false;joy.kx=JCX;joy.ky=JCY;joy.dx=joy.dy=0;}
function drawJoy(){
  X.globalAlpha=.35;
  X.strokeStyle='#55aaff';X.lineWidth=3.5;X.beginPath();X.arc(JCX,JCY,JR,0,Math.PI*2);X.stroke();
  X.strokeStyle='rgba(80,160,255,.18)';X.lineWidth=1.5;X.beginPath();X.arc(JCX,JCY,JR*.5,0,Math.PI*2);X.stroke();
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(([ax,ay])=>{X.strokeStyle='rgba(120,190,255,.3)';X.lineWidth=2;X.beginPath();X.moveTo(JCX+ax*JR*.65,JCY+ay*JR*.65);X.lineTo(JCX+ax*(JR*.65+16),JCY+ay*(JR*.65+16));X.stroke();});
  X.globalAlpha=joy.on?.85:.5;
  X.fillStyle='#2255cc';X.beginPath();X.arc(joy.kx,joy.ky,30,0,Math.PI*2);X.fill();
  X.strokeStyle='#88bbff';X.lineWidth=3;X.beginPath();X.arc(joy.kx,joy.ky,30,0,Math.PI*2);X.stroke();
  X.globalAlpha=1;
}

// ── Shake / Audio ──────────────────────────────────────────
let shake=0;
let AC=null;
function aCtx(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function tone(f,d,v=.18,tp='sine'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain(),n=AC.currentTime;o.connect(g);g.connect(AC.destination);o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.start(n);o.stop(n+d);}catch(e){}}
function synthSnd(){if(!AC)return;[[330,0],[550,.12],[880,.28],[1100,.52],[880,.78],[1320,1.05]].forEach(([f,d])=>{try{const o=AC.createOscillator(),g=AC.createGain(),n=AC.currentTime;o.connect(g);g.connect(AC.destination);o.frequency.value=f;g.gain.setValueAtTime(.22,n+d);g.gain.exponentialRampToValueAtTime(.001,n+d+.42);o.start(n+d);o.stop(n+d+.42);}catch(e){}});}

// ── Particles ──────────────────────────────────────────────
const PTS=[];
function addP(x,y,c,n,sp){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=sp*(.4+Math.random()*.9);PTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*8,c,l:1,d:.011+Math.random()*.02});}}
function burst(x,y,cs,n=40,sp=9){cs.forEach(c=>addP(x,y,c,Math.ceil(n/cs.length),sp));}
function tickP(){for(let i=PTS.length-1;i>=0;i--){const p=PTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.l-=p.d;if(p.l<=0)PTS.splice(i,1);}}
function drawP(){for(const p of PTS){X.globalAlpha=Math.max(0,p.l);X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.r*Math.max(.1,p.l),0,Math.PI*2);X.fill();}X.globalAlpha=1;}

// ── Speech bubbles (big, RPG-style) ────────────────────────
const POPS=[];
function pop(x,y,txt,c='#111'){POPS.push({x,y,txt,c,l:200,w:Math.min(340,txt.length*16+44)});}
function rRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath();}
function tickPops(){for(let i=POPS.length-1;i>=0;i--){POPS[i].l--;if(POPS[i].l<=0)POPS.splice(i,1);}}
function drawPops(){
  for(const p of POPS){
    const a=Math.min(1,p.l/25),bh=56;
    const bx=Math.max(5,Math.min(W-p.w-5,p.x-p.w/2)),by=p.y-p.w/2*0-88;
    X.globalAlpha=a;
    X.fillStyle='rgba(255,252,225,.98)';rRect(bx,by,p.w,bh,10);X.fill();
    X.strokeStyle='rgba(60,40,0,.2)';X.lineWidth=2;rRect(bx,by,p.w,bh,10);X.stroke();
    X.fillStyle='rgba(255,252,225,.98)';X.beginPath();X.moveTo(p.x-9,by+bh);X.lineTo(p.x+9,by+bh);X.lineTo(p.x,by+bh+18);X.closePath();X.fill();
    T(p.txt,bx+p.w/2,by+bh/2,20,p.c);
    X.globalAlpha=1;
  }
}
const CSAY=['このまま捨てられちゃうのかな…','ぼくも役に立ちたいな…','誰か助けて〜','ぼくにも仕事あるかな？'];
const HSAY=['まかせて！','一緒に行こう！','eメタンを作ろう！','君を助けるよ！'];
const SSAY=['✨ eメタン誕生！ ✨','✨ エネルギー進化！ ✨','✨ CO₂が生まれ変わった！ ✨','✨ 新しい燃料完成！ ✨'];

// ── Images ─────────────────────────────────────────────────
const IM={};
['co2','h2','metan'].forEach(k=>{const i=new Image();i.src=k==='metan'?'emetan.png':k+'.png';IM[k]=i;});
function drawChar(k,x,y,r,glow){
  x=Math.round(x);y=Math.round(y);
  if(glow){X.shadowColor=glow;X.shadowBlur=32;}
  const img=IM[k];
  if(img?.complete&&img.naturalWidth>0){
    X.save();X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.clip();
    const s=r*2.35;X.drawImage(img,x-s/2,y-s/2-r*.08,s,s);X.restore();
    X.strokeStyle=glow||{co2:'#5566aa',h2:'#1144cc',metan:'#118844'}[k];
    X.lineWidth=Math.max(3,r*.06);X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.stroke();
  }else{
    X.fillStyle={co2:'#44445a',h2:'#1133bb',metan:'#228844'}[k];
    X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.fill();
  }
  if(glow)X.shadowBlur=0;
}

// ── Stars ──────────────────────────────────────────────────
const STARS=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*2.5,t:Math.random()*6.28}));
function drawStars(ysc=1,alpha=1){for(const s of STARS){s.t+=.01;X.globalAlpha=(0.22+Math.sin(s.t)*.16)*alpha;X.fillStyle='#ffffff';X.fillRect(Math.round(s.x),Math.round(s.y*ysc),s.s,s.s);}X.globalAlpha=1;}

// ── Text helper ────────────────────────────────────────────
function T(s,x,y,sz,c,a='center'){
  X.save();X.font=`bold ${sz}px sans-serif`;X.textAlign=a;X.textBaseline='middle';
  X.strokeStyle='rgba(0,0,0,.95)';X.lineWidth=sz*.28;X.strokeText(s,x,y);
  X.fillStyle=c;X.fillText(s,x,y);X.restore();
}

// ── Top bar ────────────────────────────────────────────────
function topBar(title,progress){
  X.fillStyle='rgba(0,3,14,.97)';X.fillRect(0,0,W,TOP);
  X.strokeStyle='rgba(68,200,100,.28)';X.lineWidth=1.5;
  X.beginPath();X.moveTo(0,TOP);X.lineTo(W,TOP);X.stroke();
  T(title,W/2,22,22,'#88ffcc');
  if(progress!=null)T(progress,W/2,48,20,'#cceecc');
}

// ── RPG dialogue box (bottom) ──────────────────────────────
function dlg(msg,a=1){
  X.globalAlpha=a;
  X.fillStyle='rgba(0,0,0,.90)';X.fillRect(6,H-BOT+4,W-12,BOT-8);
  // outer border (white)
  X.strokeStyle='rgba(255,255,255,.65)';X.lineWidth=3;X.strokeRect(8,H-BOT+6,W-16,BOT-12);
  // inner border (teal)
  X.strokeStyle='rgba(100,220,200,.4)';X.lineWidth=1.5;X.strokeRect(13,H-BOT+11,W-26,BOT-22);
  T(msg,W/2,H-BOT/2+4,22,'#ffffff');
  X.globalAlpha=1;
}

// ── Backgrounds ────────────────────────────────────────────
function bgSpace(tint){X.fillStyle=tint||'#020408';X.fillRect(0,0,W,H);drawStars();}
function bgCity(litPct=0){
  X.fillStyle='#010208';X.fillRect(0,0,W,H);
  drawStars(.45,.7);
  const bd=[[6,H-195,48],[58,H-260,42],[106,H-220,58],[170,H-305,44],[220,H-255,55],[280,H-235,48],[332,H-278,46]];
  for(const [bx,by,bw] of bd){
    X.fillStyle='#04060e';X.fillRect(bx,by,bw,H-by);
    for(let wy=by+12;wy<H-BOT-55;wy+=22)
      for(let wx=bx+6;wx<bx+bw-6;wx+=15){
        const seed=((Math.sin(wx*7.3+wy*3.1)*43758)%1+1)%1;
        if(litPct>seed*100){X.fillStyle=`rgba(255,230,100,${.35+Math.sin(frame*.025+wx*.7)*.12})`;X.fillRect(wx,wy,9,13);}
        else{X.fillStyle='#080818';X.fillRect(wx,wy,9,13);}
      }
  }
  X.fillStyle='#030408';X.fillRect(0,H-BOT-48,W,48);
}

// ── BOSS ───────────────────────────────────────────────────
const BSAY=['再利用なんて無駄だ！','CO₂なんて捨てればいい！','ぼくの邪魔をするな！'];
let boss={};
function iBoss(){boss={x:W/2,y:PT+90,r:48,vx:1.1,vy:.6,hp:5,mhp:5,alive:true,vis:false,sT:0,ns:200,tT:0,def:false,dT:0};}
function updBoss(blobs){
  if(boss.def){boss.dT++;if(boss.dT>70)boss.alive=false;return;}
  boss.sT++;
  if(!boss.vis){if(boss.sT>=boss.ns){boss.vis=true;boss.sT=0;boss.x=80+Math.random()*(W-160);boss.y=PT+70;boss.tT=55;}return;}
  let best=null,bd=99999;
  for(const b of blobs){if(!b.alive)continue;const d=(b.x-boss.x)**2+(b.y-boss.y)**2;if(d<bd){bd=d;best=b;}}
  if(best){const dx=best.x-boss.x,dy=best.y-boss.y,d=Math.hypot(dx,dy)||1;boss.vx+=dx/d*.13;boss.vy+=dy/d*.13;}
  boss.vx=Math.max(-2.8,Math.min(2.8,boss.vx));boss.vy=Math.max(-2,Math.min(2.8,boss.vy));
  boss.x+=boss.vx;boss.y+=boss.vy;
  boss.x=Math.max(boss.r,Math.min(W-boss.r,boss.x));boss.y=Math.max(PT+18,Math.min(PB-90,boss.y));
  for(const b of blobs){if(!b.alive)continue;if((b.x-boss.x)**2+(b.y-boss.y)**2<(boss.r+b.r-.5)**2){b.alive=false;burst(b.x,b.y,['#555','#888'],6,3);}}
  boss.tT--;
  if(boss.tT<=0){pop(boss.x,boss.y-boss.r-60,BSAY[Math.floor(Math.random()*3)],'#880000');boss.tT=210;}
  boss.sT++;if(boss.sT>420){boss.vis=false;boss.sT=0;boss.ns=150;}
}
function tapBoss(x,y){
  if(!boss.vis||boss.def)return false;
  if((x-boss.x)**2+(y-boss.y)**2>(boss.r+24)**2)return false;
  boss.hp--;tone(120,.2,.15,'sawtooth');burst(boss.x,boss.y,['#ff4444','#ff8800'],12,5);
  pop(boss.x,boss.y-boss.r-60,boss.hp>0?'痛い！！':'くっ…CO₂も資源だったのか…','#cc0000');
  if(boss.hp<=0){boss.def=true;burst(boss.x,boss.y,['#44ff88','#ffff00','#ff8800'],70,11);tone(880,.4,.25);}
  return true;
}
function drawBoss(){
  if(!boss.alive||!boss.vis)return;
  X.save();
  if(boss.def){X.globalAlpha=Math.max(0,1-boss.dT/35);X.translate(boss.x,boss.y);X.scale(1+boss.dT*.06,1+boss.dT*.06);X.translate(-boss.x,-boss.y);}
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2+frame*.018,px=boss.x+Math.cos(a)*boss.r*.52,py=boss.y+Math.sin(a)*boss.r*.42;X.fillStyle='#383845';X.beginPath();X.arc(px,py,boss.r*.72,0,Math.PI*2);X.fill();}
  X.fillStyle='#484858';X.beginPath();X.arc(boss.x,boss.y,boss.r,0,Math.PI*2);X.fill();
  const bw=boss.r*3;X.fillStyle='#330000';X.fillRect(boss.x-bw/2,boss.y-boss.r-22,bw,12);X.fillStyle='#ff2200';X.fillRect(boss.x-bw/2,boss.y-boss.r-22,bw*boss.hp/boss.mhp,12);
  const er=boss.r*.24;[[boss.x-boss.r*.3,boss.y-boss.r*.1],[boss.x+boss.r*.08,boss.y-boss.r*.1]].forEach(([ex,ey])=>{X.fillStyle='#ff2200';X.beginPath();X.arc(ex,ey,er,0,Math.PI*2);X.fill();X.fillStyle='#000';X.beginPath();X.arc(ex,ey,er*.45,0,Math.PI*2);X.fill();});
  X.strokeStyle='#550000';X.lineWidth=boss.r*.1;X.beginPath();X.arc(boss.x,boss.y+boss.r*.32,boss.r*.26,Math.PI*.12,Math.PI*.88,true);X.stroke();
  T('モッタイナイ大王',boss.x,boss.y+boss.r+22,17,'#ff9999');
  X.restore();
}

// ── TITLE ──────────────────────────────────────────────────
function iT(){PTS.length=0;POPS.length=0;jE();}
function updT(){tickP();}
function drawT(){
  bgSpace();
  // big banner
  const sc=1+Math.sin(frame*.04)*.022;
  X.save();X.translate(W/2,H*.1);X.scale(sc,sc);
  X.fillStyle='rgba(0,5,20,.97)';X.fillRect(-188,-46,376,92);X.strokeStyle='#44cc88';X.lineWidth=3;X.strokeRect(-188,-46,376,92);
  T('eメタンファクトリー',0,-18,26,'#44ff88');T('〜 CO₂を救え！ 〜',0,18,22,'#ffcc44');X.restore();
  // 3 chars on title
  const cy=H*.47;
  drawChar('co2',W*.15,cy,72);T('CO₂',W*.15,cy+88,20,'#aabbaa');T('捨てられる…',W*.15,cy+112,14,'#888');
  T('➡',W*.38,cy-6,36,'#ffee66');
  drawChar('h2',W*.52,cy-14,66,'#3366ff');T('H₂',W*.52,cy+78,20,'#88aaff');T('助けに行く！',W*.52,cy+102,14,'#5577bb');
  T('➡',W*.70,cy-6,36,'#ffee66');
  drawChar('metan',W*.86,cy,66,'#44ff88');T('eメタン',W*.86,cy+80,18,'#66ffaa');T('誕生！',W*.86,cy+102,14,'#449966');
  T('CO₂ ＋ H₂ → eメタン → エネルギー',W/2,cy+135,16,'#ffcc44');
  // start button
  X.globalAlpha=.7+Math.sin(frame*.09)*.28;
  X.fillStyle='#0c2018';X.fillRect(W/2-128,H-110,256,65);X.strokeStyle='#44ff88';X.lineWidth=3.5;X.strokeRect(W/2-128,H-110,256,65);
  T('タップしてスタート！',W/2,H-78,24,'#88ffcc');
  X.globalAlpha=1;drawP();
}

// ── STAGE 1 ────────────────────────────────────────────────
let s1={};
function i1(){
  s1={blobs:[],caught:0,need:6,t:0,dT:0,done:false,combo:0,cT:0,msg:'CO₂くんをタップして救出しよう！',mT:200};
  PTS.length=0;POPS.length=0;iBoss();
  for(let i=0;i<3;i++)spCO2();
}
function spCO2(){
  const r=58+Math.random()*20,a=Math.random()*Math.PI*2,sp=.5+Math.random()*.7;
  s1.blobs.push({x:r+Math.random()*(W-r*2),y:PT+r+Math.random()*(PB-PT-r*2),r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,w:Math.random()*6.28,ws:.016+Math.random()*.014,alive:true,sc:1});
}
function upd1(){
  s1.t++;s1.mT=Math.max(0,s1.mT-1);s1.cT=Math.max(0,s1.cT-1);
  if(s1.t%130===0&&s1.blobs.filter(b=>b.alive).length<3)spCO2();
  for(const b of s1.blobs){
    if(!b.alive){b.sc=Math.max(0,b.sc-.07);continue;}
    b.w+=b.ws;b.x+=b.vx+Math.sin(b.w)*.38;b.y+=b.vy+Math.cos(b.w*1.3)*.3;
    if(b.x<b.r)b.vx=Math.abs(b.vx);if(b.x>W-b.r)b.vx=-Math.abs(b.vx);
    if(b.y<PT+b.r)b.vy=Math.abs(b.vy);if(b.y>PB-b.r)b.vy=-Math.abs(b.vy);
  }
  s1.blobs=s1.blobs.filter(b=>b.alive||b.sc>0);
  updBoss(s1.blobs);
  if(boss.def&&boss.dT===1){for(let i=0;i<2;i++)spCO2();pop(W/2,H*.4,'CO₂くんが解放された！','#22cc66');}
  tickP();tickPops();
  if(s1.caught>=s1.need&&!s1.done){s1.done=true;s1.msg='CO₂救出完了！次のステージへ！';s1.mT=9999;}
  if(s1.done){s1.dT++;if(s1.dT===120)fade(ST.S2);}
}
function tap1(x,y){
  if(s1.done)return;if(tapBoss(x,y))return;
  for(const b of s1.blobs){
    if(!b.alive)continue;
    if((x-b.x)**2+(y-b.y)**2<(b.r+12)**2){
      b.alive=false;s1.caught++;s1.cT>0?s1.combo++:(s1.combo=1);s1.cT=65;
      burst(b.x,b.y,['#778899','#aabb99','#44ff88'],22,6);
      pop(b.x,b.y-40,CSAY[Math.floor(Math.random()*4)]);tone(660,.1,.12);
      if(s1.combo>=3){burst(b.x,b.y,['#ffff00','#ff8800'],22,8);s1.msg=s1.combo+'コンボ！すごい！';s1.mT=80;}
      break;
    }
  }
}
function draw1(){
  bgSpace();
  X.globalAlpha=.04;T('南部浄化センター',W/2,H/2,40,'#fff');X.globalAlpha=1;
  for(const b of s1.blobs){
    X.save();if(!b.alive){X.globalAlpha=b.sc;X.translate(b.x,b.y);X.scale(b.sc,b.sc);X.translate(-b.x,-b.y);}
    drawChar('co2',b.x,b.y,b.r);T('CO₂',b.x,b.y+b.r+20,18,'#aabbaa');
    if(!b.alive)X.restore();
  }
  drawBoss();drawP();drawPops();
  if(s1.combo>=2&&s1.cT>0){X.globalAlpha=Math.min(1,s1.cT/15);T(s1.combo+' COMBO!',W/2,H/2-70,42,'#ffcc00');X.globalAlpha=1;}
  if(boss.vis&&!boss.def)T('モッタイナイ大王を5回タップ！',W/2,PT+25,18,'#ff9999');
  topBar('STAGE 1 ― CO₂救出','救出 '+s1.caught+' / '+s1.need+' 体');
  if(s1.mT>0)dlg(s1.msg,Math.min(1,s1.mT/30));
}

// ── STAGE 2 ────────────────────────────────────────────────
let s2={};
function i2(){
  s2={pl:{x:W/2,y:(PT+S2PB)/2,inv:0},items:[],pos:[],caught:0,need:12,t:0,dT:0,done:false,msg:'H₂を集めよう！  ☠毒ガスに注意！',mT:200};
  PTS.length=0;POPS.length=0;jE();
  for(let i=0;i<2;i++){const a=Math.random()*Math.PI*2;s2.pos.push({x:65+Math.random()*(W-130),y:PT+65+Math.random()*(S2PB-PT-120),r:22+Math.random()*8,vx:Math.cos(a)*(1.1+Math.random()*.6),vy:Math.sin(a)*(1.1+Math.random()*.6)});}
}
function upd2(){
  s2.t++;s2.mT=Math.max(0,s2.mT-1);
  const rt=Math.max(55,92-s2.t/55);
  if(s2.t%Math.round(rt)===0)s2.items.push({x:40+Math.random()*(W-80),y:PT-40,r:40+Math.random()*14,vy:1.1+Math.random()*1.1,w:Math.random()*6.28,alive:true,sc:1});
  const pl=s2.pl;
  pl.x+=joy.dx*4.8;pl.y+=joy.dy*4.8;
  pl.x=Math.max(48,Math.min(W-48,pl.x));pl.y=Math.max(PT+48,Math.min(S2PB-48,pl.y));
  if(pl.inv>0)pl.inv--;
  for(const h of s2.items){
    if(!h.alive){h.sc=Math.max(0,h.sc-.09);continue;}
    h.w+=.04;h.y+=h.vy;h.x+=Math.sin(h.w)*.85;h.x=Math.max(h.r,Math.min(W-h.r,h.x));
    if((pl.x-h.x)**2+(pl.y-h.y)**2<(52+h.r)**2){
      h.alive=false;s2.caught++;burst(h.x,h.y,['#4488ff','#88ccff'],18,6);
      pop(pl.x,pl.y-60,HSAY[Math.floor(Math.random()*4)],'#224488');tone(660,.1,.12);
    }
  }
  s2.items=s2.items.filter(h=>(h.alive||h.sc>0)&&h.y<S2PB+50);
  for(const p of s2.pos){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<p.r)p.vx=Math.abs(p.vx);if(p.x>W-p.r)p.vx=-Math.abs(p.vx);
    if(p.y<PT+p.r)p.vy=Math.abs(p.vy);if(p.y>S2PB-p.r)p.vy=-Math.abs(p.vy);
    if(pl.inv<=0&&(pl.x-p.x)**2+(pl.y-p.y)**2<(48+p.r)**2){pl.inv=80;burst(pl.x,pl.y,['#ff3333','#ff8888'],14,4);s2.msg='あぶない！毒ガスにぶつかった！';s2.mT=90;tone(220,.2,.15,'sawtooth');}
  }
  tickP();tickPops();
  if(s2.caught>=s2.need&&!s2.done){s2.done=true;s2.msg='水素回収完了！ いよいよ合成だ！';s2.mT=9999;}
  if(s2.done){s2.dT++;if(s2.dT===120)fade(ST.S3);}
}
function draw2(){
  bgSpace('#030508');
  X.globalAlpha=.04;T('消化タンク',W/2,H/2,40,'#fff');X.globalAlpha=1;
  X.strokeStyle='rgba(68,120,200,.22)';X.lineWidth=1.5;X.setLineDash([7,5]);X.beginPath();X.moveTo(0,S2PB);X.lineTo(W,S2PB);X.stroke();X.setLineDash([]);
  for(const h of s2.items){
    X.save();if(!h.alive){X.globalAlpha=h.sc;X.translate(h.x,h.y);X.scale(h.sc,h.sc);X.translate(-h.x,-h.y);}
    drawChar('h2',h.x,h.y,h.r);T('H₂',h.x,h.y+h.r+20,18,'#88aaff');
    if(!h.alive)X.restore();
  }
  for(const p of s2.pos){X.fillStyle='rgba(70,0,0,.88)';X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();X.strokeStyle='#cc2200';X.lineWidth=2.5;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.stroke();T('☠',p.x,p.y,p.r,'#ff4444');}
  const pl=s2.pl;
  if(pl.inv<=0||Math.floor(pl.inv/5)%2===0)drawChar('h2',pl.x,pl.y,54,'#3366ff');
  T('ジョイスティックで移動',W/2,S2PB+17,15,'rgba(80,130,200,.55)');
  drawJoy();drawP();drawPops();
  topBar('STAGE 2 ― 水素かいしゅう','回収 '+s2.caught+' / '+s2.need+' 個');
  if(s2.mT>0)dlg(s2.msg,Math.min(1,s2.mT/30));
}

// ── STAGE 3 ────────────────────────────────────────────────
let s3={},s3txt='',s3fl=0,s3dk=0;
function i3(){
  s3={ph:0,t:0,dT:0,done:false,orb:175,angs:[0,Math.PI*.5,Math.PI,Math.PI*1.5],mR:0,mp:0,msg:'CO₂をタップして合体！',mT:240};
  PTS.length=0;POPS.length=0;s3fl=0;s3dk=0;shake=0;
  s3txt=SSAY[Math.floor(Math.random()*4)];
}
function upd3(){
  s3.t++;s3.mT=Math.max(0,s3.mT-1);
  if(s3.ph===0){s3.angs=s3.angs.map(a=>a+.022);}
  else if(s3.ph===1){
    s3.orb=Math.max(0,s3.orb-4.8);s3dk=Math.min(.9,s3dk+.02);
    if(s3.orb<=0){
      s3.ph=2;s3.t=0;shake=30;aCtx();synthSnd();
      if(navigator.vibrate)navigator.vibrate([90,40,90,40,260]);
      burst(W/2,H*.42,['#44ff88','#ffff00','#88ffcc','#ff8844','#fff','#ffcc00'],160,22);
    }
  }
  else if(s3.ph===2){
    s3fl=Math.min(2.4,s3fl+.15);s3dk=Math.max(0,s3dk-.07);
    if(shake>.5)shake*=.8;else shake=0;
    if(s3.t>18){s3.ph=3;s3.t=0;}
  }
  else if(s3.ph===3){
    s3fl=Math.max(0,s3fl-.04);s3.mR=Math.min(110,s3.mR+5.8);s3.mp+=.07;
    if(s3.t<100&&s3.t%14===0)addP(W/2+(Math.random()-.5)*20,H*.42+(Math.random()-.5)*20,'#44ff88',7,3.5);
    if(s3.t>115&&!s3.done)s3.done=true;
  }
  tickP();tickPops();
  if(s3.done){s3.dT++;if(s3.dT===165)fade(ST.S4);}
}
function tap3(x,y){
  if(s3.ph!==0)return;
  if((x-W/2)**2+(y-H*.42)**2<105*105){s3.ph=1;s3.msg='はんのう開始！！';s3.mT=90;burst(W/2,H*.42,['#ffff44','#fff'],22,7);aCtx();}
}
function draw3(){
  bgSpace('#040218');
  X.globalAlpha=.04;T('知多LNG共同基地',W/2,H/2,38,'#fff');X.globalAlpha=1;
  if(s3dk>0){X.fillStyle=`rgba(0,0,6,${s3dk})`;X.fillRect(0,0,W,H);}
  const cx=W/2,cy=H*.42;
  X.save();if(shake>.5)X.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  if(s3.ph<3||s3fl>.6){
    drawChar('co2',cx,cy,94);
    if(s3.ph===0){const p=1+Math.sin(frame*.1)*.1;X.save();X.translate(cx,cy-118);X.scale(p,p);X.fillStyle='rgba(255,215,0,.97)';X.fillRect(-70,-26,140,52);T('タップ！',0,0,28,'#333');X.restore();}
  }
  if(s3.ph<=1)for(const a of s3.angs){const hx=cx+Math.cos(a)*s3.orb,hy=cy+Math.sin(a)*s3.orb*.75;drawChar('h2',hx,hy,s3.ph===1?58:52);}
  if(s3.mR>0){
    const pr=Math.sin(s3.mp)*8;drawChar('metan',cx,cy,s3.mR+pr,'#44ff88');
    if(s3.mR>60){
      const tsc=1+Math.sin(frame*.08)*.06;X.save();X.translate(cx,cy-s3.mR-80);X.scale(tsc,tsc);
      X.fillStyle='rgba(0,16,6,.96)';X.fillRect(-160,-32,320,64);X.strokeStyle='#44ff88';X.lineWidth=3;X.strokeRect(-160,-32,320,64);
      T(s3txt,0,0,s3.mR>90?24:20,'#ffff44');X.restore();
    }
    if(s3.done)for(let i=0;i<8;i++){const sa=i/8*Math.PI*2+frame*.06,sr=s3.mR+55;T('★',cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,24,'#ffee44');}
  }
  X.restore();
  if(s3fl>0){X.fillStyle=`rgba(255,255,255,${Math.min(1,s3fl)})`;X.fillRect(0,0,W,H);}
  drawP();drawPops();
  topBar('STAGE 3 ― メタネーション！',null);
  if(s3.mT>0)dlg(s3.msg,Math.min(1,s3.mT/30));
}

// ── STAGE 4 ────────────────────────────────────────────────
let s4={};
const PIPY=H-BOT-78;
function i4(){s4={bubs:[],del:0,need:5,t:0,dT:0,done:false,msg:'eメタンをタップしてガス管へ送り込め！',mT:210};PTS.length=0;POPS.length=0;}
function upd4(){
  s4.t++;s4.mT=Math.max(0,s4.mT-1);
  if(s4.t%80===0&&s4.bubs.filter(b=>b.alive).length<3)s4.bubs.push({x:60+Math.random()*(W-120),y:PT+H*.06+Math.random()*H*.12,r:56,vx:(Math.random()-.5)*.5,vy:-.3,w:Math.random()*6.28,alive:true,sc:1});
  for(const b of s4.bubs){
    if(!b.alive){b.sc=Math.max(0,b.sc-.07);continue;}
    b.w+=.025;b.x+=b.vx+Math.sin(b.w)*.5;b.y+=b.vy;b.vy=Math.min(b.vy+.025,1.6);
    b.x=Math.max(b.r,Math.min(W-b.r,b.x));
    if(b.y<PT+b.r){b.vy=Math.abs(b.vy)*.6;}
    if(b.y>PIPY-b.r){b.y=PIPY-b.r;b.vy*=-.45;addP(b.x,PIPY,'#44ff88',4,2);}
  }
  s4.bubs=s4.bubs.filter(b=>b.alive||b.sc>0);
  tickP();tickPops();
  if(s4.del>=s4.need&&!s4.done){s4.done=true;s4.msg='出荷完了！eメタンが街へ届く！';s4.mT=9999;}
  if(s4.done){s4.dT++;if(s4.dT===120)fade(ST.E);}
}
function tap4(x,y){
  if(s4.done)return;
  let best=null,bd=99999;
  for(const b of s4.bubs){if(!b.alive)continue;const d=(x-b.x)**2+(y-b.y)**2;if(d<bd&&d<(b.r+65)**2){bd=d;best=b;}}
  if(best){
    const dx=x-best.x,dy=y-best.y,d=Math.hypot(dx,dy)||1;best.vx+=dx/d*2;best.vy+=3.5;burst(best.x,best.y,['#44ff88','#88ffcc'],8,3);
    if(best.y>PIPY-95){best.alive=false;s4.del++;burst(best.x,PIPY,['#44ff88','#ffcc00','#88ffcc'],32,7);tone(880,.12,.15);}
  }else{for(const b of s4.bubs){if(!b.alive)continue;const dx=x-b.x,d2=(x-b.x)**2+(y-b.y)**2;if(d2<210*210){b.vy+=1.1;b.vx+=dx/(Math.sqrt(d2)||1)*.8;}}burst(x,y,['#44ff88'],6,2);}
}
function draw4(){
  bgCity(0);
  X.globalAlpha=.04;T('都市ガス配管',W/2,H/2,38,'#fff');X.globalAlpha=1;
  X.fillStyle='#181800';X.fillRect(0,PIPY,W,42);
  X.fillStyle=`rgba(68,255,100,${.45+Math.sin(frame*.06)*.2})`;X.fillRect(0,PIPY,W,9);
  for(let px=14;px<W;px+=58){X.fillStyle='#252500';X.fillRect(px,PIPY-18,26,18);}
  T('🏠 都市ガス管 🏭',W/2,PIPY+25,16,'#aacc00');
  for(const b of s4.bubs){
    X.save();if(!b.alive){X.globalAlpha=b.sc;X.translate(b.x,b.y);X.scale(b.sc,b.sc);X.translate(-b.x,-b.y);}
    drawChar('metan',b.x,b.y,b.r,'#44ff88');T('eメタン',b.x,b.y+b.r+22,18,'#66ffaa');
    if(!b.alive)X.restore();
  }
  if(s4.t<160){X.globalAlpha=.5+Math.sin(frame*.14)*.3;T('↓ タップして押し込め ↓',W/2,H*.55,20,'#ffff66');X.globalAlpha=1;}
  drawP();drawPops();
  topBar('STAGE 4 ― 都市ガス出荷','出荷 '+s4.del+' / '+s4.need);
  if(s4.mT>0)dlg(s4.msg,Math.min(1,s4.mT/30));
}

// ── ENDING: 3 screens ──────────────────────────────────────
let eT=0,ePh=0,eLit=0;
function iE(){eT=0;ePh=0;eLit=0;PTS.length=0;POPS.length=0;}
function updE(){
  eT++;eLit=Math.min(100,eLit+(ePh>=1&&eT>20?1.5:0));
  if(ePh===0&&eT>55&&eT%18===0)burst(30+Math.random()*(W-60),20+Math.random()*(H*.28),['#ffff44','#44ff88','#ff8844','#ff4488'],12,7);
  if(ePh===1&&eT>30&&eT%24===0)burst(30+Math.random()*(W-60),20+Math.random()*(H*.4),['#ffff44','#ff8844','#44ff88'],10,6);
  tickP();
}
function tapE(x,y){
  if(ePh===0&&eT>55){ePh=1;eT=0;PTS.length=0;}
  else if(ePh===1&&eT>110){ePh=2;eT=0;PTS.length=0;}
  else if(ePh===2&&eT>140&&y>H-88&&y<H-18&&x>W/2-130&&x<W/2+130){fade(ST.T);}
}
// SCREEN 1 ─ COMPLETE + 3 chars
function drawE0(){
  bgSpace('#020310');
  const sc=1+Math.sin(frame*.05)*.03;
  X.save();X.translate(W/2,H*.09);X.scale(sc,sc);T('🎉 COMPLETE 🎉',0,0,46,'#ffff44');X.restore();
  X.strokeStyle='rgba(68,255,100,.4)';X.lineWidth=2;X.beginPath();X.moveTo(25,H*.18);X.lineTo(W-25,H*.18);X.stroke();
  // big 3 chars
  const cy=H*.46;
  drawChar('co2',W*.16,cy,76);T('CO₂',W*.16,cy+92,22,'#aabbaa');
  drawChar('h2',W*.5,cy-16,86,'#3366ff');T('H₂',W*.5,cy+106,22,'#88aaff');
  drawChar('metan',W*.84,cy,76,'#44ff88');T('eメタン',W*.84,cy+92,20,'#66ffaa');
  // master title
  const msc=1+Math.sin(frame*.07)*.04;
  X.save();X.translate(W/2,H*.75);X.scale(msc,msc);
  X.fillStyle='rgba(0,0,0,.75)';X.fillRect(-165,-28,330,56);X.strokeStyle='rgba(255,255,255,.5)';X.lineWidth=2;X.strokeRect(-165,-28,330,56);
  T('知多市エネルギーマスター！',0,0,26,'#ffffff');X.restore();
  if(eT>55){X.globalAlpha=.6+Math.sin(frame*.1)*.32;T('タップして続ける ▶',W/2,H*.9,20,'#88ffcc');X.globalAlpha=1;}
}
// SCREEN 2 ─ city lights up + icons
function drawE1(){
  bgCity(eLit);
  X.strokeStyle=`rgba(68,255,100,${.5+Math.sin(frame*.07)*.25})`;X.lineWidth=8;X.beginPath();X.moveTo(0,H-BOT-58);X.lineTo(W,H-BOT-58);X.stroke();
  T('都市ガス管',W/2,H-BOT-40,17,'#88ff88');
  [[W*.2,H*.28,'🛁','お風呂が沸いた！','#66aaff',20],
   [W*.5, H*.31,'🍳','ご飯ができた！','#ff9955',65],
   [W*.8, H*.28,'🏭','工場が動き出した！','#44ff88',110]].forEach(([x,y,icon,lbl,c,at])=>{
    if(eT<at)return;const a=Math.min(1,(eT-at)/35);X.globalAlpha=a;
    X.shadowColor=c;X.shadowBlur=28+Math.sin(frame*.08)*8;
    T(icon,x,y,56,c);X.shadowBlur=0;T(lbl,x,y+62,22,c);X.globalAlpha=1;
  });
  if(eT>110){X.globalAlpha=.6+Math.sin(frame*.1)*.32;T('タップして続ける ▶',W/2,H*.92,20,'#88ffcc');X.globalAlpha=1;}
  drawP();
}
// SCREEN 3 ─ formula summary
function drawE2(){
  bgSpace('#010208');
  // Animated formula: items fade in sequentially
  const items=[
    [W/2, H*.1,  'co2', 58, 'CO₂',  '#aabbaa', 0 ],
    [null, H*.21, null, 0,  '+',    '#ffff88', 22 ],
    [W/2, H*.28, 'h2',  58, 'H₂',   '#88aaff', 35 ],
    [null, H*.42, null, 0,  '↓',    '#88ffcc', 55 ],
    [W/2, H*.49, 'metan',68,'eメタン','#66ffaa',68 ],
    [null, H*.64, null, 0,  '↓',    '#ffcc44', 90 ],
    [null, H*.72, null, 0,  'エネルギー ⚡','#ffff44',105],
  ];
  for(const [x,y,key,r,lbl,c,at] of items){
    if(eT<at)continue;const a=Math.min(1,(eT-at)/22);X.globalAlpha=a;
    if(key){drawChar(key,x,y,r,key==='metan'?'#44ff88':null);T(lbl,x,y+r+18,22,c);}
    else if(lbl==='エネルギー ⚡'){
      const sc=1+Math.sin(frame*.08)*.05;X.save();X.translate(W/2,y);X.scale(sc,sc);
      X.fillStyle='rgba(50,30,0,.92)';X.fillRect(-140,-32,280,64);X.strokeStyle='#ffcc44';X.lineWidth=3;X.strokeRect(-140,-32,280,64);
      T(lbl,0,0,32,'#ffff44');X.restore();
    }else T(lbl,W/2,y,42,c);
    X.globalAlpha=1;
  }
  // final message
  if(eT>130){
    const a=Math.min(1,(eT-130)/35);X.globalAlpha=a;
    X.fillStyle='rgba(0,0,0,.88)';X.fillRect(8,H-175,W-16,100);X.strokeStyle='rgba(255,255,255,.55)';X.lineWidth=2.5;X.strokeRect(10,H-173,W-20,96);X.strokeStyle='rgba(100,220,200,.35)';X.lineWidth=1.5;X.strokeRect(15,H-168,W-30,86);
    T('CO₂はゴミじゃない！',W/2,H-140,28,'#88ffcc');
    T('君が作ったeメタンが街を動かした！',W/2,H-108,19,'#ffcc44');
    X.globalAlpha=1;
  }
  // replay
  if(eT>140){
    X.globalAlpha=.7+Math.sin(frame*.1)*.28;
    X.fillStyle='#0c1e0c';X.fillRect(W/2-130,H-80,260,62);X.strokeStyle='#44ff88';X.lineWidth=3.5;X.strokeRect(W/2-130,H-80,260,62);
    T('もう一度あそぶ',W/2,H-49,24,'#88ffcc');
    X.globalAlpha=1;
  }
  drawP();
}

// ── Input ──────────────────────────────────────────────────
function onTap(x,y){
  if(fd.dir)return;aCtx();
  if(state===ST.T){burst(x,y,['#44ff88','#ffff44'],20,7);fade(ST.S1);}
  else if(state===ST.S1)tap1(x,y);
  else if(state===ST.S2){jS(x,y);}
  else if(state===ST.S3)tap3(x,y);
  else if(state===ST.S4)tap4(x,y);
  else if(state===ST.E)tapE(x,y);
}
function onMove(x,y){
  if(state===ST.S2)jM(x,y);
  else if(state===ST.S4&&!fd.dir)tap4(x,y);
}
function onEnd(){if(state===ST.S2)jE();}
C.addEventListener('touchstart',e=>{const p=gp(e);onTap(p.x,p.y);},{passive:false});
C.addEventListener('touchmove',e=>{const p=gp(e);onMove(p.x,p.y);},{passive:false});
C.addEventListener('touchend',()=>onEnd(),{passive:false});
C.addEventListener('touchcancel',()=>onEnd(),{passive:false});
C.addEventListener('click',e=>{const p=gp(e);onTap(p.x,p.y);});
C.addEventListener('mousemove',e=>{if(e.buttons){const p=gp(e);onMove(p.x,p.y);}});
C.addEventListener('mouseup',()=>onEnd());

// ── Main loop ──────────────────────────────────────────────
iT();
function loop(){
  try{
    frame++;X.clearRect(0,0,W,H);updFade();
    if(state===ST.T){updT();drawT();}
    else if(state===ST.S1){upd1();draw1();}
    else if(state===ST.S2){upd2();draw2();}
    else if(state===ST.S3){upd3();draw3();}
    else if(state===ST.S4){upd4();draw4();}
    else if(state===ST.E){updE();if(ePh===0)drawE0();else if(ePh===1)drawE1();else drawE2();}
    if(fd.a>0){X.fillStyle=`rgba(0,0,0,${fd.a})`;X.fillRect(0,0,W,H);}
  }catch(ex){console.error('GameError:',ex);}
  requestAnimationFrame(loop);
}
loop();
</script>
