<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>eメタンファクトリー Ver.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
#c{position:fixed;touch-action:none;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c');
const X=C.getContext('2d');
const W=390,H=844;
C.width=W;C.height=H;
function resize(){const sw=window.innerWidth,sh=window.innerHeight,s=Math.min(sw/W,sh/H),cw=W*s,ch=H*s;C.style.width=cw+'px';C.style.height=ch+'px';C.style.left=((sw-cw)/2)+'px';C.style.top=((sh-ch)/2)+'px';}
resize();window.addEventListener('resize',resize);
function getPos(e){const t=e.changedTouches?e.changedTouches[0]:e,r=C.getBoundingClientRect();return{x:(t.clientX-r.left)*W/r.width,y:(t.clientY-r.top)*H/r.height};}
['touchstart','touchmove','touchend','touchcancel'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));

// ============================================================
// Layout constants
// ============================================================
const TOP=70;   // top bar height (stage title + gauges)
const BOT=52;   // bottom msgBar height
const PLAY_T=TOP;      // play area top
const PLAY_B=H-BOT;    // play area bottom (default)
const S2_PLAY_B=H-190; // S2 play area bottom (above joystick zone)
const S2_JOY_CX=W/2, S2_JOY_CY=H-105, S2_JOY_R=65; // joystick

// ============================================================
// State
// ============================================================
const ST={TITLE:0,S1:1,S2:2,S3:3,S4:4,END:5};
let state=ST.TITLE,frame=0;
let co2G=0,h2G=0,methG=0,gasG=0;
let fd={a:0,dir:0,next:-1};
function startFade(n){if(fd.dir===0){fd.dir=1;fd.next=n;}}
function updateFade(){
  if(fd.dir===0)return;
  fd.a=Math.min(1,Math.max(0,fd.a+fd.dir*0.055));
  if(fd.dir===1&&fd.a>=1){fd.dir=-1;state=fd.next;[initTitle,initS1,initS2,initS3,initS4,initEnd][fd.next]?.();}
  if(fd.dir===-1&&fd.a<=0){fd.a=0;fd.dir=0;fd.next=-1;}
}

// ============================================================
// Virtual joystick (S2 only)
// ============================================================
let joy={active:false,kx:S2_JOY_CX,ky:S2_JOY_CY,dx:0,dy:0};
function joyStart(x,y){
  const dx=x-S2_JOY_CX,dy=y-S2_JOY_CY;
  if(dx*dx+dy*dy<(S2_JOY_R+25)*(S2_JOY_R+25)){
    joy.active=true;joyMove(x,y);return true;
  }return false;
}
function joyMove(x,y){
  if(!joy.active)return;
  const dx=x-S2_JOY_CX,dy=y-S2_JOY_CY,d=Math.sqrt(dx*dx+dy*dy);
  const cr=Math.min(d,S2_JOY_R);
  joy.kx=S2_JOY_CX+(d>0?dx/d*cr:0);joy.ky=S2_JOY_CY+(d>0?dy/d*cr:0);
  joy.dx=d>0?dx/d*Math.min(1,d/S2_JOY_R):0;joy.dy=d>0?dy/d*Math.min(1,d/S2_JOY_R):0;
}
function joyEnd(){joy.active=false;joy.kx=S2_JOY_CX;joy.ky=S2_JOY_CY;joy.dx=0;joy.dy=0;}
function drawJoy(){
  // base ring
  X.globalAlpha=0.35;
  X.strokeStyle='#44aaff';X.lineWidth=3;X.beginPath();X.arc(S2_JOY_CX,S2_JOY_CY,S2_JOY_R,0,Math.PI*2);X.stroke();
  // inner guide rings
  X.strokeStyle='rgba(68,170,255,0.25)';X.lineWidth=1.5;
  X.beginPath();X.arc(S2_JOY_CX,S2_JOY_CY,S2_JOY_R*.5,0,Math.PI*2);X.stroke();
  // knob
  X.globalAlpha=joy.active?0.75:0.4;
  X.fillStyle='#4488ff';X.beginPath();X.arc(joy.kx,joy.ky,24,0,Math.PI*2);X.fill();
  X.strokeStyle='#88ccff';X.lineWidth=2;X.beginPath();X.arc(joy.kx,joy.ky,24,0,Math.PI*2);X.stroke();
  // direction arrows (faint)
  X.globalAlpha=0.2;X.strokeStyle='#88ccff';X.lineWidth=2;
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(([ax,ay])=>{
    const r=S2_JOY_R*.7;
    X.beginPath();X.moveTo(S2_JOY_CX+ax*r,S2_JOY_CY+ay*r);X.lineTo(S2_JOY_CX+ax*(r+12),S2_JOY_CY+ay*(r+12));X.stroke();
  });
  X.globalAlpha=1;
}

// ============================================================
// Screen shake
// ============================================================
let shakeAmt=0;
function triggerShake(n){shakeAmt=n;}

// ============================================================
// Audio
// ============================================================
let AC=null;
function ensureAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playTone(freq,dur,vol=0.2,type='sine'){
  if(!AC)return;
  try{const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function playSynth(){
  if(!AC)return;
  try{const t=AC.currentTime;
    [[330,0],[550,0.1],[880,0.25],[660,0.45],[1100,0.6],[880,0.8]].forEach(([f,d])=>{
      const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';
      o.frequency.setValueAtTime(f,t+d);g.gain.setValueAtTime(0.18,t+d);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.35);
      o.start(t+d);o.stop(t+d+0.35);
    });}catch(e){}
}
function playPop(){playTone(660,0.08,0.1);}

// ============================================================
// Particles
// ============================================================
const PTS=[];
function addP(x,y,col,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(0.4+Math.random()*0.9);PTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*6,col,l:1,d:0.013+Math.random()*0.02});}}
function burst(x,y,cols,n=40,spd=8){cols.forEach(c=>addP(x,y,c,Math.ceil(n/cols.length),spd));}
function tickP(){for(let i=PTS.length-1;i>=0;i--){const p=PTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.l-=p.d;if(p.l<=0)PTS.splice(i,1);}}
function drawP(){for(const p of PTS){X.globalAlpha=Math.max(0,p.l);X.fillStyle=p.col;X.beginPath();X.arc(p.x,p.y,p.r*Math.max(0.1,p.l),0,Math.PI*2);X.fill();}X.globalAlpha=1;}

// ============================================================
// Speech bubbles
// ============================================================
const POPS=[];
function showPop(x,y,text,col='#333'){POPS.push({x,y:y-10,text,col,life:155,bw:Math.min(240,text.length*11+30)});}
function tickPops(){for(let i=POPS.length-1;i>=0;i--){POPS[i].life--;if(POPS[i].life<=0)POPS.splice(i,1);}}
function drawPops(){
  for(const p of POPS){
    const a=Math.min(1,p.life/25);X.globalAlpha=a;
    const bx=Math.max(4,Math.min(W-p.bw-4,p.x-p.bw/2)),by=p.y-44;
    X.fillStyle='rgba(255,252,230,0.97)';X.fillRect(bx,by,p.bw,30);
    X.strokeStyle='rgba(0,0,0,0.12)';X.lineWidth=1;X.strokeRect(bx,by,p.bw,30);
    X.fillStyle='rgba(255,252,230,0.97)';
    X.beginPath();X.moveTo(p.x-6,by+30);X.lineTo(p.x+6,by+30);X.lineTo(p.x,by+42);X.closePath();X.fill();
    T(p.text,bx+p.bw/2,by+15,12,p.col);X.globalAlpha=1;
  }
}
const CO2_SAY=['このまま捨てられちゃうのかな…','ぼくも役に立ちたいな…','誰か助けて〜','ぼくにも仕事あるかな？'];
const H2_SAY=['まかせて！','一緒に行こう！','eメタンを作ろう！','君を助けるよ！'];
const SYNTH_SAY=['✨ eメタン誕生！','✨ エネルギー進化！','✨ CO₂が生まれ変わった！','✨ 新しい燃料完成！'];

// ============================================================
// Images
// ============================================================
const IMGS={};
['co2','h2','metan'].forEach(k=>{const i=new Image();i.src=k==='metan'?'emetan.png':k+'.png';IMGS[k]=i;});
function drawChar(key,x,y,r,glow){
  x=Math.round(x);y=Math.round(y);
  if(glow){X.shadowColor=glow;X.shadowBlur=22;}
  const img=IMGS[key];
  if(img&&img.complete&&img.naturalWidth>0){
    X.save();X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.clip();
    const s=r*2.3;X.drawImage(img,x-s/2,y-s/2-r*0.08,s,s);X.restore();
  }else{
    const fc={co2:'#44445a',h2:'#1144bb',metan:'#229944'};
    X.fillStyle=fc[key];X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.fill();
  }
  if(glow)X.shadowBlur=0;
}

// ============================================================
// Stars
// ============================================================
const STARS=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+1,t:Math.random()*6.28}));

// ============================================================
// Draw helpers
// ============================================================
function T(s,x,y,sz,col,align='center'){
  X.save();X.font=`bold ${sz}px sans-serif`;X.textAlign=align;X.textBaseline='middle';
  X.strokeStyle='rgba(0,0,0,0.95)';X.lineWidth=sz*.22;X.strokeText(s,x,y);
  X.fillStyle=col;X.fillText(s,x,y);X.restore();
}

// Top HUD bar (used by all stages)
function drawTopBar(title,sub,extra){
  X.fillStyle='rgba(0,5,18,0.94)';X.fillRect(0,0,W,TOP);
  X.strokeStyle='rgba(68,200,100,0.25)';X.lineWidth=1;X.strokeRect(0,0,W,TOP);
  T(title,W/2,17,17,'#88ffcc');
  if(sub)T(sub,W/2,38,14,'#aaddbb');
  if(extra){
    const gw=(W-24)/3;
    drawGauge('CO₂レスキュー',co2G,8,52,gw,16,'#778899');
    drawGauge('水素回収',h2G,8+gw+4,52,gw,16,'#3366cc');
    drawGauge('eメタン',methG,8+gw*2+8,52,gw,16,'#339966');
  }
}
function drawGauge(label,val,x,y,w,h,col){
  X.fillStyle='#06060f';X.fillRect(x,y,w,h);X.strokeStyle='#1a1a2a';X.lineWidth=1;X.strokeRect(x,y,w,h);
  X.fillStyle=col;X.fillRect(x+1,y+1,(w-2)*Math.min(val/100,1),h-2);
  T(label,x+4,y+h/2,9,'#ccc','left');T(Math.round(val)+'%',x+w-3,y+h/2,9,'#ccc','right');
}
function msgBar(msg,a=1){
  X.globalAlpha=a;
  X.fillStyle='rgba(0,5,16,.92)';X.fillRect(6,H-BOT+4,W-12,BOT-8);
  X.strokeStyle='rgba(80,180,80,.28)';X.lineWidth=1;X.strokeRect(6,H-BOT+4,W-12,BOT-8);
  T(msg,W/2,H-BOT/2,13,'#ffff88');X.globalAlpha=1;
}
function stageLabel(name){X.globalAlpha=0.055;X.font='bold 30px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillStyle='#fff';X.fillText(name,W/2,H/2);X.globalAlpha=1;}

// ============================================================
// Backgrounds
// ============================================================
function drawBG(tint){
  X.fillStyle=tint||'#04040e';X.fillRect(0,0,W,H);
  for(const s of STARS){s.t+=0.012;X.globalAlpha=0.28+Math.sin(s.t)*0.2;X.fillStyle='#fff';X.fillRect(Math.round(s.x),Math.round(s.y),s.s,s.s);}
  X.globalAlpha=1;
  X.fillStyle='#040c06';X.fillRect(0,H-100,W,100);
  [[12,H-195,72],[105,H-168,58],[222,H-205,82],[318,H-178,62]].forEach(([bx,by,bw])=>{X.fillStyle='#060f08';X.fillRect(bx,by,bw,H-100-by);});
  [[30,H-235,12],[56,H-252,10],[244,H-258,13],[278,H-238,10],[344,H-228,11]].forEach(([cx,cy,cw])=>{X.fillStyle='#05090a';X.fillRect(cx,cy,cw,H-100-cy);});
}
function drawCityBG(){
  X.fillStyle='#02030f';X.fillRect(0,0,W,H);
  for(const s of STARS){s.t+=0.01;X.globalAlpha=0.35+Math.sin(s.t)*0.25;X.fillStyle='#ddeeff';X.fillRect(Math.round(s.x),Math.round(s.y/2),s.s,s.s);}
  X.globalAlpha=1;
  [[0,H-160,45],[50,H-225,38],[90,H-182,52],[145,H-255,42],[192,H-198,32],[232,H-235,56],[292,H-178,42],[338,H-215,52]].forEach(([bx,by,bw])=>{
    X.fillStyle='#070820';X.fillRect(bx,by,bw,H-by);
    for(let wy=by+10;wy<H-30;wy+=18)for(let wx=bx+5;wx<bx+bw-5;wx+=12)
      if(Math.sin(wx*7.3+wy*3.1)>0.15){X.fillStyle=`rgba(255,235,100,${0.35+Math.sin(frame*.02+wx)*.2})`;X.fillRect(wx,wy,7,9);}
  });
  X.fillStyle='#070820';X.fillRect(0,H-55,W,55);
}

// ============================================================
// BOSS: モッタイナイ大王
// ============================================================
const BOSS_SAY=['CO₂なんて捨ててしまえ！','再利用なんて面倒だ！','全部燃やしてしまえ！'];
let boss={};
function initBoss(){boss={x:W/2,y:H*.3,r:40,vx:0.8,vy:0.4,hp:5,maxHP:5,alive:true,visible:false,showT:0,nextShow:200,talkT:0,defeated:false,defeatT:0};}
function updateBoss(blobs){
  if(boss.defeated){boss.defeatT++;if(boss.defeatT>80)boss.alive=false;return;}
  boss.showT++;
  if(!boss.visible){if(boss.showT>=boss.nextShow){boss.visible=true;boss.showT=0;boss.x=W*.2+Math.random()*W*.6;boss.y=TOP+50;boss.talkT=50;}return;}
  let target=null,td=99999;
  for(const b of blobs){if(!b.alive)continue;const dx=b.x-boss.x,dy=b.y-boss.y,d=dx*dx+dy*dy;if(d<td){td=d;target=b;}}
  if(target){const dx=target.x-boss.x,dy=target.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1;boss.vx+=dx/d*0.1;boss.vy+=dy/d*0.1;}
  boss.vx=Math.max(-2.5,Math.min(2.5,boss.vx));boss.vy=Math.max(-2,Math.min(2.5,boss.vy));
  boss.x+=boss.vx;boss.y+=boss.vy;
  boss.x=Math.max(boss.r,Math.min(W-boss.r,boss.x));boss.y=Math.max(TOP+20,Math.min(PLAY_B-60,boss.y));
  for(const b of blobs){if(!b.alive)continue;const dx=b.x-boss.x,dy=b.y-boss.y;if(dx*dx+dy*dy<(boss.r+b.r)*(boss.r+b.r)){b.alive=false;burst(b.x,b.y,['#555','#333'],8,3);}}
  boss.talkT--;if(boss.talkT<=0){showPop(boss.x,boss.y-boss.r-8,BOSS_SAY[Math.floor(Math.random()*3)],'#880000');boss.talkT=200;}
  boss.showT++;if(boss.showT>380){boss.visible=false;boss.showT=0;boss.nextShow=160;}
}
function tapBoss(x,y){
  if(!boss.visible||boss.defeated)return false;
  const dx=x-boss.x,dy=y-boss.y;
  if(dx*dx+dy*dy>(boss.r+20)*(boss.r+20))return false;
  boss.hp--;playPop();burst(boss.x,boss.y,['#ff4444','#ff8800'],12,4);
  showPop(boss.x,boss.y-boss.r-10,boss.hp>0?'痛い！':'CO₂も資源だったのか…','#cc0000');
  if(boss.hp<=0){boss.defeated=true;burst(boss.x,boss.y,['#44ff88','#ffff00','#ff8800'],50,8);}
  return true;
}
function drawBoss(){
  if(!boss.alive||!boss.visible)return;
  X.save();
  if(boss.defeated){X.globalAlpha=Math.max(0,1-boss.defeatT/35);X.translate(boss.x,boss.y);X.scale(1+boss.defeatT*.04,1+boss.defeatT*.04);X.translate(-boss.x,-boss.y);}
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+frame*.02,px=boss.x+Math.cos(a)*boss.r*.45,py=boss.y+Math.sin(a)*boss.r*.38;X.fillStyle='#4a4a5a';X.beginPath();X.arc(px,py,boss.r*.65,0,Math.PI*2);X.fill();}
  X.fillStyle='#5a5a6a';X.beginPath();X.arc(boss.x,boss.y,boss.r,0,Math.PI*2);X.fill();
  const bw=boss.r*2.5;X.fillStyle='#333';X.fillRect(boss.x-bw/2,boss.y-boss.r-15,bw,9);X.fillStyle='#ff3333';X.fillRect(boss.x-bw/2,boss.y-boss.r-15,bw*(boss.hp/boss.maxHP),9);
  const er=boss.r*.19;
  [[boss.x-boss.r*.28,boss.y-boss.r*.1],[boss.x+boss.r*.1,boss.y-boss.r*.1]].forEach(([ex,ey])=>{
    X.fillStyle='#ff2200';X.beginPath();X.arc(ex,ey,er,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.beginPath();X.arc(ex,ey,er*.45,0,Math.PI*2);X.fill();
  });
  X.strokeStyle='#660000';X.lineWidth=Math.max(2,boss.r*.08);X.beginPath();X.arc(boss.x,boss.y+boss.r*.32,boss.r*.2,Math.PI*.1,Math.PI*.9,true);X.stroke();
  T('モッタイナイ大王',boss.x,boss.y+boss.r+16,12,'#ff8888');
  X.restore();
}

// ============================================================
// TITLE
// ============================================================
let titleBubs=[];
function initTitle(){
  titleBubs=Array.from({length:7},()=>({x:Math.random()*W,y:Math.random()*H,r:18+Math.random()*22,vx:(Math.random()-.5)*.7,vy:(Math.random()-.5)*.7,w:Math.random()*6.28,type:Math.random()<.5?'co2':'h2'}));
  PTS.length=0;POPS.length=0;co2G=0;h2G=0;methG=0;gasG=0;
}
function updateTitle(){for(const b of titleBubs){b.w+=.014;b.x+=b.vx+Math.sin(b.w)*.3;b.y+=b.vy;if(b.x<-b.r)b.x=W+b.r;if(b.x>W+b.r)b.x=-b.r;if(b.y<-b.r)b.y=H+b.r;if(b.y>H+b.r)b.y=-b.r;}tickP();}
function drawTitle(){
  drawBG();
  X.globalAlpha=0.18;for(const b of titleBubs)drawChar(b.type,b.x,b.y,b.r);X.globalAlpha=1;
  drawP();
  const p=Math.sin(frame*.04)*.02+1;
  X.save();X.translate(W/2,H*.14);X.scale(p,p);
  X.fillStyle='rgba(0,4,14,.94)';X.fillRect(-172,-46,344,94);X.strokeStyle='#44cc88';X.lineWidth=2.5;X.strokeRect(-172,-46,344,94);
  T('eメタンファクトリー Ver.2',0,-20,20,'#44ff88');T('〜 CO₂を救え！ 〜',0,14,17,'#ffcc44');X.restore();
  const cy=H*.41;
  drawChar('co2',W*.14,cy,30);T('CO₂',W*.14,cy+40,13,'#aaa');T('捨てられる…',W*.14,cy+58,11,'#888');
  T('→',W*.32,cy,20,'#ffee66');
  drawChar('h2',W*.50,cy,28);T('H₂',W*.50,cy+40,13,'#88aaff');T('助けに行く！',W*.50,cy+58,11,'#5577bb');
  T('→',W*.68,cy,20,'#ffee66');
  drawChar('metan',W*.84,cy,28,'#44ff88');T('eメタン',W*.84,cy+40,13,'#66ffaa');T('誕生！',W*.84,cy+58,11,'#449966');
  T('↓ みんなの生活を支える',W/2,cy+80,14,'#ffcc44');
  const sy=cy+103;
  X.fillStyle='rgba(0,8,4,.85)';X.fillRect(10,sy,W-20,114);X.strokeStyle='rgba(68,200,100,.2)';X.lineWidth=1;X.strokeRect(10,sy,W-20,114);
  [['① CO₂救出','南部浄化センター','#88ffcc'],
   ['② 水素回収','消化タンク','#88aaff'],
   ['③ eメタン合成','知多LNG共同基地','#44ff88'],
   ['④ 都市ガス出荷','都市ガス配管','#ffcc44']].forEach(([s,loc,c],i)=>{
    T(s,22,sy+18+i*26,13,c,'left');T(loc,W-18,sy+18+i*26,10,'#556677','right');
  });
  X.globalAlpha=.6+Math.sin(frame*.09)*.35;
  X.fillStyle='#112a1a';X.fillRect(W/2-114,H-95,228,52);X.strokeStyle='#44ff88';X.lineWidth=2.5;X.strokeRect(W/2-114,H-95,228,52);

function spawnCO2(){
  const r=26+Math.random()*18,a=Math.random()*Math.PI*2,sp=.6+Math.random()*1.0;

    r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,w:Math.random()*6.28,ws:.02+Math.random()*.02,alive:true,scale:1});

function updateS1(){
  s1.timer++;s1.msgT=Math.max(0,s1.msgT-1);s1.comboT=Math.max(0,s1.comboT-1);
  if(s1.timer%100===0&&s1.blobs.filter(b=>b.alive).length<7)spawnCO2();
  for(const b of s1.blobs){
    if(!b.alive){b.scale=Math.max(0,b.scale-.09);continue;}
    b.w+=b.ws;b.x+=b.vx+Math.sin(b.w)*.4;b.y+=b.vy+Math.cos(b.w*1.3)*.3;

    if(b.y>PLAY_B-b.r){b.vy=-Math.abs(b.vy);b.y=PLAY_B-b.r;}
  }
  for(let i=s1.blobs.length-1;i>=0;i--)if(!s1.blobs[i].alive&&s1.blobs[i].scale<=0)s1.blobs.splice(i,1);
  updateBoss(s1.blobs);

    T(icon,x+36,y+33,30,col);X.shadowBlur=0;T(label,x+36,y+70,10,col);
    X.strokeStyle=`rgba(68,255,100,.25)`;X.lineWidth=1;X.setLineDash([4,4]);
    X.beginPath();X.moveTo(x+36,y+86);X.lineTo(x+36,H*.72);X.stroke();X.setLineDash([]);
    X.globalAlpha=1;
  });
  if(endScene>=4){
    const af=Math.min(1,(endT-330)/65);X.globalAlpha=af;
    X.fillStyle='rgba(0,5,18,.96)';X.fillRect(5,H*.49,W-10,H*.23);
    X.strokeStyle='rgba(68,255,136,.38)';X.lineWidth=1.5;X.strokeRect(5,H*.49,W-10,H*.23);
    ['CO₂はゴミではありません。','知多市では下水処理で発生したCO₂を',
     '利用しeメタンを作る実証が行われています。','捨てられるはずだったCO₂は',
     '新しいエネルギーに生まれ変わりました。'].forEach((l,i)=>T(l,W/2,H*.505+i*28,12,'#88ffcc'));
    X.globalAlpha=1;
  }
  if(endT>420){
    X.globalAlpha=.6+Math.sin(frame*.1)*.35;
    X.fillStyle='#112a1a';X.fillRect(W/2-108,H-72,216,48);X.strokeStyle='#44ff88';X.lineWidth=2.5;X.strokeRect(W/2-108,H-72,216,48);
    T('もう一度あそぶ',W/2,H-49,17,'#88ffcc');X.globalAlpha=1;
  }
}

// ============================================================
// Input
// ============================================================
function onTap(x,y){
  if(fd.dir!==0)return;
  ensureAudio();
  if(state===ST.TITLE){burst(x,y,['#44ff88','#ffff00'],15,5);startFade(ST.S1);}
  else if(state===ST.S1)tapS1(x,y);
  else if(state===ST.S2){if(!joyStart(x,y)){}/* tap in game area does nothing for S2 */}
  else if(state===ST.S3)tapS3(x,y);
  else if(state===ST.S4)tapS4(x,y);
  else if(state===ST.END&&endT>420&&y>H-72&&y<H-24&&x>W/2-108&&x<W/2+108)startFade(ST.TITLE);
}
function onMove(x,y){
  if(state===ST.S2)joyMove(x,y);
  else if(state===ST.S4)tapS4(x,y);
}
function onEnd(){if(state===ST.S2)joyEnd();}

C.addEventListener('touchstart',e=>{const p=getPos(e);onTap(p.x,p.y);},{passive:false});
C.addEventListener('touchmove',e=>{const p=getPos(e);onMove(p.x,p.y);},{passive:false});
C.addEventListener('touchend',e=>{onEnd();},{passive:false});
C.addEventListener('touchcancel',e=>{onEnd();},{passive:false});
C.addEventListener('click',e=>{const p=getPos(e);onTap(p.x,p.y);});
C.addEventListener('mousemove',e=>{if(e.buttons){const p=getPos(e);onMove(p.x,p.y);}});
C.addEventListener('mouseup',e=>{onEnd();});

// ============================================================
// Main Loop
// ============================================================
initTitle();
function loop(){
  try{
    frame++;X.clearRect(0,0,W,H);updateFade();
    if(state===ST.TITLE){updateTitle();drawTitle();}
    else if(state===ST.S1){updateS1();drawS1();}
    else if(state===ST.S2){updateS2();drawS2();}
    else if(state===ST.S3){updateS3();drawS3();}
    else if(state===ST.S4){updateS4();drawS4();}
    else if(state===ST.END){updateEnd();drawEnd();}
    if(fd.a>0){X.fillStyle=`rgba(0,0,0,${fd.a})`;X.fillRect(0,0,W,H);}
  }catch(e){console.error('GameError:',e);}
  requestAnimationFrame(loop);
}
loop();
</script>
